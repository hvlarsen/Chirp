name: Build and deploy Chirp.Razor to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Publish Chirp.Razor
        run: dotnet publish src/Chirp.Razor/Chirp.Razor.csproj -c Release -o ./publish_output
      - name: Inspect publish output for CSV
        run: |
          echo "Looking for CSV in publish_output:"
          find ./publish_output -name "chirp_cli_db.csv" -print || echo "NOT FOUND"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ChirpPrivate' # must match your Azure Web App name
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish_output
